<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <p>Empresa lol</p>
    </header>

    <main>
        <h1>Registro</h1>
        <form action ="">
            <label for="nombre">Nombre</label><br>
            <input type="text" id="nombre" placeholder="Ingrese su nombre..." required><br>
            <div id="error_nombre" class="texto-error" style="color: red;"></div><br>

            <label for="apellido">Apellido</label><br>
            <input type="text" id="apellido" placeholder="Ingrese su apellido..." required><br>
            <div id="error_apellido" class="texto-error" style="color: red;"></div><br>

            <label for="cargo">Cargo</label><br>
            <input type="text" id="cargo" placeholder="Ingrese su cargo..." required><br>
            <div id="error_cargo" class="texto-error" style="color: red;"></div><br>

            <label for="email">Email</label><br>
            <input type="email" id="email" placeholder="Ingrese su email..." required><br>
            <div id="error_email" class="texto-error" style="color: red;"></div><br>

            <button id="boton-registrarse">Registrarse</button>
        </form>
        <div class="contenedor">
            <h2>Lista empleados</h2>
            <input type="text" id="filtro-input" placeholder="Search for names..">
            <div id="contenedor-tabla-empleados">
                    <table id="tabla-empleados">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Apellido</th>
                                <th>Cargo</th>
                                <th>Email</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpo-tabla">
                        </tbody>
                    </table>
            </div>
        </div>
    </main>

    <footer>

    </footer>
    <script src="script.js"></script>
</body>
</html>
